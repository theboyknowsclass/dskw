<div class="settings-container">
  <div class="toolbar">
    <button routerLink="/">Back</button>
  </div>

  <div class="content">
    <h2>Settings</h2>

    <div class="settings-group">
      <h3>Appearance</h3>

      <div class="setting-item">
        <span>Dark Mode</span>
        <label class="toggle">
          <input
            type="checkbox"
            [checked]="isDarkMode()"
            (change)="toggleTheme()"
          />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="settings-group">
      <h3>About</h3>
      <p>DSKW Angular Version</p>
      <p class="version">1.0.0</p>
    </div>
  </div>
</div>
